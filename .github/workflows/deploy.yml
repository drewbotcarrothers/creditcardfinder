name: Deploy to Hostinger

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Change to app directory
        run: cd app
          
      - name: Install dependencies
        working-directory: ./app
        run: npm install
        
      - name: Build Next.js app
        working-directory: ./app
        run: npm run build
        
      - name: List build contents
        run: |
          echo "Contents of out folder:"
          ls -la ./app/out/
          echo "Size of build:"
          du -sh ./app/out/
          
      - name: Deploy to Hostinger via FTP
        run: |
          sudo apt-get update && sudo apt-get install -y ncftp
          
          # Upload to Hostinger (port 21, target: public_html)
          cd ./app/out
          ncftpput -R -v -P 21 -u "$FTP_USERNAME" -p "$FTP_PASSWORD" "$FTP_HOST" /public_html .
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
