name: Deploy to Hostinger via Rsync

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        working-directory: app
        run: npm ci
        
      - name: Build Next.js app
        working-directory: app
        run: npm run build
        
      - name: List build contents
        run: |
          echo "Contents of out folder:"
          ls -la ./app/out/
          echo "Size of build:"
          du -sh ./app/out/
          
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          
      - name: Deploy to Hostinger via Rsync
        run: |
          echo "Deploying to Hostinger..."
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./app/out/ \
            ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}:/home/u163076614/domains/canadiancreditcardfinder.com/public_html/
        env:
          SSH_AUTH_SOCK: ${{ env.SSH_AUTH_SOCK }}
